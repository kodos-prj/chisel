name: Build Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version to build (e.g., v1.0.0)"
        required: true

jobs:
  build:
    name: Build Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.25"

      - name: Get version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION="${{ github.ref_name }}"
          fi
          echo "version=${VERSION}" >> $GITHUB_OUTPUT

      - name: Build
        env:
          GOOS: linux
          GOARCH: amd64
        run: |
          go mod download
          mkdir -p build
          OUTPUT_NAME="chisel-${{ steps.version.outputs.version }}-linux-amd64"
          go build -ldflags="-s -w" -o "./build/${OUTPUT_NAME}" ./cmd/chisel

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: chisel-${{ steps.version.outputs.version }}-linux-amd64
          path: build/
          retention-days: 30

  create-release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: ncipollo/release-action@v1
        with:
          artifacts: "artifacts/*/*"
          bodyFile: "CHANGELOG.md"
          draft: false
          prerelease: false
